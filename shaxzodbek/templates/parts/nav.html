{% load static %}
<nav>
    <div class="logo">
        <h4>Shaxzodbek's Blog</h4>
    </div>
    <button class="hamburger">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>
    <div class="links">
        <ul>
            <li><a href="{% url 'root' %}">Home</a></li>
            <li><a href="{% url 'connections' %}">Connection</a></li>
            <li><a href="{% url 'cvs' %}">CV</a></li>
            <li><a href="{% url 'problems' %}">Problems</a></li>
            {% if request.user.is_staff %}
            <li><a href="{% url 'admin:index' %}">Admin</a></li>
            {% endif %}
        </ul>
    </div>
    <div class="login">
        {% if request.user.is_authenticated %}
            <p>Hello, {{ request.user.first_name }}</p>
            <a href="{% url 'logout' %}">Log Out</a>
        {% else %}
            <a href="{% url 'login' %}">Log In</a>
            <a href="{% url 'signup' %}">Sign Up</a>
        {% endif %}
    </div>
</nav>
