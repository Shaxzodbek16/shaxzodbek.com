<!DOCTYPE html>
<html lang="uz">
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #eeeeee;
        }

        .header img {
            max-width: 100px;
        }

        .content {
            color: #333333;
        }

        .otp {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
            text-align: center;
            margin: 20px 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
            text-align: center;
            border-top: 1px solid #eeeeee;
            padding-top: 20px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .otp {
                font-size: 24px;
            }

        }
    </style>
    <title>Email confirm</title>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://shaxzodbek.com/logo.png" alt="Logo">
    </div>
    <div class="content">
        <p>Hi {{ user.first_name }},</p>
        <p>Thanks for signing up on {{ domain }}.</p>
        <p>Please verify your email using the one-time passcode below:</p>
        <div class="otp">{{ otp }}</div>
        <p>If you did not request this, please ignore this email.</p>
    </div>
    <div class="footer">
        <p>Best regards,<br>{{ domain }} Team</p>
        <p>&copy; {{ year }} {{ domain }}. All rights reserved.</p>
    </div>
</div>
</body>
</html>
