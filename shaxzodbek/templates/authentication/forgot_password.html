{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'authentication/css/forgot_password.css' %}">
</head>
<body>
<div class="background-circle circle-bottom-1"></div>
<div class="background-circle circle-bottom-1-2"></div>
<main class="reset-main">
    <div class="reset-main__illustration">
        <img src="{% static 'authentication/img/forgot_password.png' %}" alt="Reset Password Illustration">
    </div>
    <div class="reset-main__form">
        <h1 class="title">Reset Password</h1>
        <form method="POST" action="/password-reset/">
            {% csrf_token %}
            <div class="input-group">
                <i class='bx bx-envelope input-icon'></i>
                <input
                    type="email"
                    name="email"
                    class="input-field"
                    placeholder="Enter your email address"
                    required
                    autocomplete="email">
            </div>
            <button type="submit" class="reset-button">Send Reset Link</button>
            <div class="login-link">
                Remember your password? <a href="{% url 'login' %}">Login</a>
            </div>
        </form>
    </div>
</main>


</body>
</html>
