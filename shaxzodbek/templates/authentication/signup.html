{% extends 'parts/base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="container mx-auto mt-10">
    <h1 class="text-3xl font-bold mb-5">Sign Up</h1>
    {% if messages %}
        {% for message in messages %}
            <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label for="email" class="block text-gray-700">Email:</label>
            <input type="email" name="email" id="email" class="w-full border rounded px-3 py-2" required>
        </div>
        <div class="mb-4">
            <label for="name" class="block text-gray-700">Name:</label>
            <input type="text" name="name" id="name" class="w-full border rounded px-3 py-2" required>
        </div>
        <div class="mb-4">
            <label for="password1" class="block text-gray-700">Password:</label>
            <input type="password" name="password1" id="password1" class="w-full border rounded px-3 py-2" required>
        </div>
        <div class="mb-6">
            <label for="password2" class="block text-gray-700">Confirm Password:</label>
            <input type="password" name="password2" id="password2" class="w-full border rounded px-3 py-2" required>
        </div>
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Sign Up</button>
    </form>
    <p class="mt-4">Already have an account? <a href="{% url 'login' %}" class="text-blue-500">Log In</a></p>
</div>
{% endblock %}
