<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <link rel="stylesheet" href="{% static 'authentication/css/password_reset.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<link rel="stylesheet" href="{% static 'authentication/css/password_reset.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">



<div class="background-circle circle-bottom-1"></div>
<div class="background-circle circle-bottom-2"></div>
    <div class="background-circle circle-bottom-3"></div>
<div class="background-circle circle-bottom-4"></div>

<main class="reset-main">

    <div class="reset-main__form">
        <div class="form-container">
            <div class="form-header">
                <i class='bx bx-key'></i>
                <h1>Reset Password</h1>
                <p>Please enter your new password below.</p>
            </div>

            <form method="POST" class="reset-form">
                {% csrf_token %}
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class='bx bx-lock-alt input-icon'></i>
                        <input
                            type="password"
                            id="password1"
                            name="password1"
                            class="input-field"
                            required
                            placeholder="Enter new password">
                        <button type="button" class="toggle-password">
                            <i class='bx bx-show'></i>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <i class='bx bx-lock-alt input-icon'></i>
                        <input
                            type="password"
                            id="password2"
                            name="password2"
                            class="input-field"
                            required
                            placeholder="Confirm new password">
                        <button type="button" class="toggle-password">
                            <i class='bx bx-show'></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="reset-button">
                    <span>Reset Password</span>
                    <i class='bx bx-check'></i>
                </button>

                <div class="login-link">
                    Remember your password? <a href="{% url 'login' %}">Login</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
