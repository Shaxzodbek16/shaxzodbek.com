{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Code</title>
    <link rel="stylesheet" href="{% static 'authentication/css/verify_email.css' %}">
</head>
<style>
    body {
        background: url('{% static "authentication/img/sign_up_page.png" %}') no-repeat center center/cover;
    }
</style>
<body>
<div class="verify-code-card fade-in">
    <h2 class="verify-code-title">Verify Your Code</h2>
    <p class="verify-code-description">
        Enter the 6-digit passcode you received on your email address ending with {{ email }}
    </p>
    <form method="post">
        {% csrf_token %}
        <label>
            <input name="code" type="text" class="verify-code-input" maxlength="6" pattern="\d{6}" autofocus required
                   placeholder="Enter code here" {% if passcode %}value="{{ passcode }}" {% endif %}>
        </label>
        <button type="submit" class="verify-code-button">Verify</button>
    </form>
</div>
</body>
</html>
